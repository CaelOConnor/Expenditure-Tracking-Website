<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="description"
      content="Overview of Expenditure Tracking Website"
    />
    <meta name="viewport" content="width=device-width, intial-scale=1.0" />
    <title>Login Page</title>

    <link href="css/login_styles.css" rel="stylesheet" />
    <script type="module">
      import App from './js/login.js';

      const app = new App();
    </script>
  </head>
  <body>
    <header class="navbar">
      <p class="logo">ExpenseTracker</p>
      <ul class="nav-list">
        <li><a href="index.html">Home</a></li>
        <li><a href="login.html">Login</a></li>
      </ul>
    </header>
    <main class="wrapper">
      <div class="container">
        <div class="form-box active" id="login-form">
          <form id="login" action="">
            <h1>Login</h1>
            <input id="email" type="email" name="email" placeholder="Email" required />
            <input
              id="password"
              type="password"
              name="password"
              placeholder="Password"
              required
            />
            <button type="submit" name="login">Login</button>

            <div class="form-error hidden" id="error-message">
              <p>Invalid Username or Password</p>
            </div>

            <p>
              Don't have an account?
              <a href="#" onclick="showform('register-form')">Register</a>
            </p>
          </form>
        </div>

        <div class="form-box" id="register-form">
          <form action="">
            <h1>Register</h1>
            <input type="text" name="name" placeholder="Name" required />
            <input type="email" name="email" placeholder="Email" required />
            <input
              type="password"
              name="password"
              placeholder="Password"
              required
            />
            <select name="role" required>
              <option value="">--Select Role--</option>
              <option value="user">User</option>
              <option value="admin">Admin</option>
            </select>
            <button type="submit" name="register">Register</button>
            <p>
              Already have an account?
              <a href="#" onclick="showform('login-form')">Login</a>
            </p>
          </form>
        </div>
      </div>
    </main>
    <script src="script.js"></script>
  </body>
</html>
