<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="description"
      content="Overview of Expenditure Tracking Website"
    />
    <meta name="viewport" content="width=device-width, intial-scale=1.0" />
    <title>Home Page</title>

    <link href="css/home_styles.css" rel="stylesheet" />
    <script type="module">
      import App from "./js/Expenses.js";
      import Popup from "./js/Add-expenditure-popup.js";

      const app = new App();
      const popup = new Popup();
    </script>
  </head>
  <body>
    <header class="navbar">
      <p class="logo">Welcome, USER!</p>
      <ul class="nav-list">
        <li class="dropdown">
          <a href="index.html" class="dropbtn">Account</a>
          <ul class="dropdown-content">
            <li><a href="settings.html" class="dropbtn">Settings</a></li>
            <li><a href="index.html" class="dropbtn">Logout</a></li>
          </ul>
        </li>
      </ul>
    </header>
    <main class="wrapper">
      <div class="expenditure-buttons-container">
        <nav class="home-buttons">
          <ul class="nav-list">
            <li><button id="add-expense" type="button">Add</button></li>
            <li><input type="search" id="search" /></li>
            <li>
              <label for="SortBy"></label>
              <select id="SortBy" name="Sort By">
                <option value="Most-Recent">Most Recent</option>
                <option value="Oldest">Oldest</option>
                <option value="Highest-Expenditure">Highest Expenditure</option>
                <option value="Lowest-Expenditure">Lowest Expenditure</option>
              </select>
            </li>

            <li>
              <a href="trends.html"><button type="button">Trends</button></a>
            </li>
          </ul>
        </nav>
      </div>
      <div class="expenditures-container">
        <div id="recent-expenses" class="expenditure-container">
          <h1>Most Recent</h1>
          
        </div>

        <div id="highest-expenses" class="expenditure-container">
          <h1>Highest Expenditure</h1>
          
        </div>
      </div>

      <div class="add-item-popup" >
        <div class="input-list">
          <label for="amount">Amount:</label>
          <input type="number" id="amount">
          <div>
              <!-- <label for="type">Type:</label> -->
              <select id="type-selector" name="Type">
                <option value="" disabled selected hidden>Type</option>
                <option value="food">Food</option>
                <option value="bills">Bills</option>
                <option value="housing">Housing</option>
                <option value="health">Health</option>
                <option value="transportation">Transportation</option>
                <option value="entertainment">Entertainment</option>
                <option value="miscellaneous">Miscellaneous</option>
              </select>
            </div>
          <label for="description">Description:</label>
          <input type="text" id="description">
          <label for="date">Date:</label>
          <input type="date" id="date">
          <button type="submit" id="popup-submit-btn">Submit</button>
          <button id="close-popup-btn">Cancel</button>
        </div>
      </div>

    </main>
  </body>
</html>
